version: '3.8'

services:
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: benji-minio-s3
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: minio server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 2s
      timeout: 5s
      retries: 30
    networks:
      - benji-test

  minio-init:
    image: amazon/aws-cli:2.13.32
    container_name: benji-minio-init
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./init-buckets.sh:/init-buckets.sh
    entrypoint: /init-buckets.sh
    networks:
      - benji-test

volumes:
  minio_data:

networks:
  benji-test:
    driver: bridge

