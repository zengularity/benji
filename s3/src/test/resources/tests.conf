## Define the following settings in your local.conf
## Or use the defaults below for MinIO simulation

# Default MinIO settings (localhost)
ceph.s3.host="localhost:9000"
ceph.s3.accessKey="minioadmin"
ceph.s3.secretKey="minioadmin123"
ceph.s3.protocol=http

aws.s3.host="localhost:9000"
aws.s3.accessKey="minioadmin"
aws.s3.secretKey="minioadmin123"
aws.s3.protocol=http
aws.s3.region=us-east-1

# Override with local.conf if it exists
include "local.conf"