## Define the following settings in your local.conf

#google.storage.projectId=cafe-babe-123

include "local.conf"
# See also JSON credential in gcs-test.json

# Storage-testbench configuration for local/CI testing
# https://github.com/googleapis/storage-testbench
google.storage {
  testbench {
    enabled = false                           # Enable/disable testbench
    enabled = ${?BENJI_USE_TESTBENCH}         # Can be overridden by env var
    
    host = "localhost"
    host = ${?TESTBENCH_HOST}
    
    port = 9000
    port = ${?TESTBENCH_PORT}
  }
}